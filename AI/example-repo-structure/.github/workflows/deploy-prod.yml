# =============================================================================
# Deploy Production — Manual Production Release
# =============================================================================
# Manually triggered (manual trigger = approval gate). Deploys a specific
# version to production with full security scanning and validation.
#
# Flow:
#   1. Validate version (must be semver, must not already exist as tag)
#   2. Security scan (all layers, strict mode)
#   3. Build container images tagged with version
#   4. Scan container images for vulnerabilities
#   5. Generate SBOMs (Software Bill of Materials)
#   6. Run database migrations
#   7. Deploy services
#   8. Validate deployment health
#   9. Create GitHub Release with SBOMs attached
# =============================================================================

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      allow_existing_images:
        description: "Skip image build and use existing images (for retry after build succeeded but deploy failed)"
        type: boolean
        default: false

