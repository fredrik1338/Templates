# =============================================================================
# Prepare Release — Version Bump & Changelog Generation
# =============================================================================
# Manually triggered when you're ready to cut a release. Creates a PR
# with a version bump and auto-generated changelog.
#
# Flow:
#   1. Human selects version type (patch / minor / major)
#   2. Workflow generates changelog from commits since last tag
#   3. Updates VERSION file and CHANGELOG.md
#   4. Creates a PR for review
#   5. After PR merge → run deploy-qa or deploy-prod workflow
# =============================================================================

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
