# =============================================================================
# Deploy Dev — Automatic Development Deployment
# =============================================================================
# Triggered automatically when code is pushed to main (after PR merge).
# Deploys backend and frontend to the dev environment.
#
# Skips deployment for docs-only or infrastructure-only changes.
# =============================================================================

name: Deploy Dev

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "plans/**"
      - "security/**"
      - "infrastructure/**"
      - "**.md"
      - "!README.md"

  # Allow manual trigger with options to force-deploy specific services
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Force backend deploy even if unchanged"
        type: boolean
        default: false
      force_frontend:
        description: "Force frontend deploy even if unchanged"
        type: boolean
        default: false

# env:
