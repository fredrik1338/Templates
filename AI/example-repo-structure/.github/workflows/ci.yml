# =============================================================================
# CI — Continuous Integration
# =============================================================================
# Runs on every pull request. Validates code quality, runs tests, and
# performs security scanning before code can be merged.
#
# This is the quality gate — nothing merges without passing CI.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  # Also run on release branches for pre-release validation
  push:
    branches: ["release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Detect what changed to skip unnecessary work ---
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  # --- Security scanning (dependencies, secrets, filesystem) ---
  security:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    uses: ./.github/workflows/security-scan.yml
